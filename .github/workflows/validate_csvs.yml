name: Validate all Geoconnex CSVs and bulk XML files

on: [push]

jobs:
  validate-csvs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: run duplicate test
        run: |
          python3 tests/validate_csv.py
          python3 tests/validate_bulk.py
